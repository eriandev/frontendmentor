name: Manual Deploy
run-name: Manual deploy to production

on: workflow_dispatch

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-22.04

    env:
      PUBLIC_API_URL: ${{ secrets.PUBLIC_API_URL }}

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v6

      - name: Use pnpm 🗜️
        uses: pnpm/action-setup@v5
        with:
          version: 10.32.1
          run_install: false

      - name: Use Node.js 🐢
        uses: actions/setup-node@v6
        with:
          node-version: 22.22.1
          cache: 'pnpm'

      - name: Install dependencies ⚙️
        run: pnpm install

      - name: Build 🛠️
        run: pnpm build:prod

      - name: Disable Jekyll ⛔
        run: touch dist/.nojekyll

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist